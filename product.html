  <link rel="stylesheet" href="css/style.css" />
  <style>
    .product-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-12) var(--space-8);
    }

    .product-breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
      font-size: var(--text-sm);
      color: var(--color-text-soft);
    }

    .product-breadcrumb a {
      color: var(--color-text-soft);
      text-decoration: none;
      transition: color var(--t-fast);
    }
    .product-breadcrumb a:hover { color: var(--color-ink); }
    .product-breadcrumb span { color: var(--color-text-muted); }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-16);
      align-items: start;
    }

    /* ── Gallery ── */
    .product-gallery {}

    .product-main-img {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: var(--radius-lg);
      background: var(--color-parchment);
      background-size: cover;
      background-position: center;
      margin-bottom: var(--space-3);
      overflow: hidden;
      position: relative;
    }

    .product-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-thumbs {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .product-thumb {
      width: 72px;
      height: 90px;
      border-radius: var(--radius-md);
      background: var(--color-parchment);
      background-size: cover;
      background-position: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color var(--t-fast);
      overflow: hidden;
      flex-shrink: 0;
    }

    .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .product-thumb.active { border-color: var(--color-rose); }
    .product-thumb:hover { border-color: var(--color-warm-200); }

    /* ── Info ── */
    .product-info-panel {
      position: sticky;
      top: calc(var(--header-h) + 2rem);
    }

    .product-eyebrow {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-rose);
      margin-bottom: var(--space-3);
    }

    .product-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 400;
      color: var(--color-ink);
      line-height: 1.15;
      margin-bottom: var(--space-4);
    }

    .product-price-wrap {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .product-price-main {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--color-ink);
    }

    .product-price-old {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      text-decoration: line-through;
    }

    .product-price-badge {
      padding: var(--space-1) var(--space-2);
      background: var(--color-rose);
      color: white;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
    }

    .product-divider {
      height: 1px;
      background: var(--color-border);
      margin: var(--space-6) 0;
    }

    .product-section-label {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-soft);
      margin-bottom: var(--space-3);
    }

    .product-desc {
      font-size: var(--text-sm);
      color: var(--color-text-soft);
      line-height: 1.8;
      margin-bottom: var(--space-8);
    }

    /* Stock badge */
    .stock-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: 100px;
      font-size: var(--text-xs);
      font-weight: 600;
      margin-bottom: var(--space-6);
    }

    .stock-badge--in {
      background: rgba(39,174,96,.1);
      color: #1a8a4a;
    }

    .stock-badge--out {
      background: rgba(192,57,43,.1);
      color: #c0392b;
    }

    .stock-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* CTA buttons */
    .product-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .btn-cart-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      width: 100%;
      padding: 1rem;
      background: var(--color-ink);
      color: var(--color-cream);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--t-base);
    }
    .btn-cart-add:hover { background: var(--color-ink-soft); }
    .btn-cart-add:disabled { opacity: .5; cursor: not-allowed; }

    .btn-wishlist-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      width: 100%;
      padding: 0.9rem;
      background: transparent;
      color: var(--color-ink);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: border-color var(--t-base), background var(--t-base);
    }
    .btn-wishlist-add:hover { border-color: var(--color-rose); background: var(--color-rose-light); }

    /* Features */
    .product-features {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .product-feature {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-soft);
    }

    .product-feature svg { flex-shrink: 0; color: var(--color-rose); margin-top: 1px; }

    /* Related */
    .related-section {
      max-width: 1200px;
      margin: var(--space-24) auto var(--space-16);
      padding: 0 var(--space-8);
    }

    .related-section .section-title {
      margin-bottom: var(--space-8);
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
    }

    /* Loading */
    .product-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    @media (max-width: 900px) {
      .product-layout { grid-template-columns: 1fr; gap: var(--space-8); }
      .product-info-panel { position: static; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .product-page { padding: var(--space-6) var(--space-4); }
    }
  </style>
</head>
<body>

        <button class="nav-icon-btn cart-btn" aria-label="Корзина" id="cart-toggle">

          <span class="cart-count" id="cart-count">0</span>

  <div class="mobile-nav" id="mobile-nav" aria-hidden="true">

    </div>

  <main id="product-main">
    <div class="product-loading">

        <span class="loading-dot"></span>

  <!-- ─── КНОПКА НАВЕРХ ────────────────────────────────── -->

  <script src="js/script.js"></script>
  <script>
    const SUPABASE_URL = 'https://acylsytogrgyesrcbthx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_sTp-NwKK2dqaMjjMDcqDsA_HSl45kVD';

    const id = new URLSearchParams(location.search).get('id');

    async function loadProduct() {
      if (!id) { location.href = 'catalog.html'; return; }

      try {
        const [pRes, relRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
          }),
          fetch(`${SUPABASE_URL}/rest/v1/products?id=neq.${id}&limit=4&order=created_at.desc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
          })
        ]);

        const [products, related] = await Promise.all([pRes.json(), relRes.json()]);
        const p = products[0];
        if (!p) { location.href = 'catalog.html'; return; }

        document.title = `${p.name} — Aura Pink`;
        renderProduct(p, related);

      } catch {
        document.getElementById('product-main').innerHTML = '<div style="text-align:center;padding:6rem">Не удалось загрузить товар</div>';
      }
    }

    function renderProduct(p, related) {
      const price = Number(p.price).toLocaleString('ru-RU');
      const discount = p.old_price ? Math.round((1 - p.price/p.old_price)*100) : 0;

      const catLabels = { dress:'Платья', suit:'Костюмы', blouse:'Блузы', skirt:'Юбки', other:'Другое' };

      document.getElementById('product-main').innerHTML = `
        <div class="product-page">
          <nav class="product-breadcrumb">
            <a href="index.html">Главная</a>
            <span>/</span>
            <a href="catalog.html">Каталог</a>
            <span>/</span>
            <a href="catalog.html?cat=${p.category}">${catLabels[p.category] || 'Каталог'}</a>
            <span>/</span>
            <span style="color:var(--color-ink)">${p.name}</span>
          </nav>

          <div class="product-layout">
            <!-- Gallery -->
            <div class="product-gallery">
              <div class="product-main-img" id="main-img">
                ${p.image_url
                  ? `<img src="${p.image_url}" alt="${p.name}" />`
                  : `<div style="width:100%;height:100%;background:var(--color-parchment);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);font-size:3rem">✦</div>`}
              </div>
              ${p.image_url ? `<div class="product-thumbs">
                <div class="product-thumb active" style="background-image:url('${p.image_url}')"></div>
              </div>` : ''}
            </div>

            <!-- Info -->
            <div class="product-info-panel">
              <p class="product-eyebrow">Aura Pink · ${catLabels[p.category] || ''}</p>
              <h1 class="product-title">${p.name}</h1>

              <div class="product-price-wrap">
                <span class="product-price-main">${price} ₽</span>
                ${p.old_price ? `<span class="product-price-old">${Number(p.old_price).toLocaleString('ru-RU')} ₽</span>` : ''}
                ${discount > 0 ? `<span class="product-price-badge">−${discount}%</span>` : ''}
              </div>

              <span class="stock-badge ${p.in_stock ? 'stock-badge--in' : 'stock-badge--out'}">
                ${p.in_stock ? 'В наличии' : 'Нет в наличии'}
              </span>

              ${p.description ? `
                <div class="product-divider"></div>
                <p class="product-section-label">Описание</p>
                <p class="product-desc">${p.description}</p>
              ` : ''}

              <div class="product-actions">
                <button class="btn-cart-add" id="add-to-cart-btn" ${!p.in_stock ? 'disabled' : ''}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                  ${p.in_stock ? 'Добавить в корзину' : 'Нет в наличии'}
                </button>
                <button class="btn-wishlist-add" id="wishlist-btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                  В избранное
                </button>
              </div>

              <div class="product-divider"></div>

              <div class="product-features">
                <div class="product-feature">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  Безопасная оплата через ЮKassa
                </div>
                <div class="product-feature">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                  Доставка по всей России — <a href="delivery.html" style="color:var(--color-rose)">подробнее</a>
                </div>
                <div class="product-feature">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                  Возврат в течение 14 дней
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Похожие товары -->
        ${related.length > 0 ? `
        <section class="related-section">
          <h2 class="section-title">Похожие товары</h2>
          <div class="related-grid products-grid" id="related-grid"></div>
        </section>` : ''}
      `;

      // Добавить в корзину
      document.getElementById('add-to-cart-btn')?.addEventListener('click', () => {
        if (typeof addToCart === 'function') {
          addToCart({ id: p.id, name: p.name, price: p.price, image: p.image_url });
        }
        const btn = document.getElementById('add-to-cart-btn');
        btn.textContent = '✓ Добавлено';
        btn.style.background = '#27AE60';
        setTimeout(() => {
          btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Добавить в корзину';
          btn.style.background = '';
        }, 2000);
      });

      // Похожие товары
      const relGrid = document.getElementById('related-grid');
      if (relGrid) {
        related.forEach(r => {
          const card = document.createElement('article');
          card.className = 'product-card';
          const rPrice = Number(r.price).toLocaleString('ru-RU');
          const imgStyle = r.image_url ? `background-image:url('${r.image_url}');background-size:cover;background-position:center;` : '';
          card.innerHTML = `
            <a href="product.html?id=${r.id}" style="text-decoration:none;color:inherit">
              <div class="product-img-wrap">
                <div class="product-img" style="${imgStyle}"></div>
              </div>
              <div class="product-info">
                <p class="product-brand">Aura Pink</p>
                <h3 class="product-name">${r.name}</h3>
                <div class="product-footer"><span class="product-price">${rPrice} ₽</span></div>
              </div>
            </a>`;
          relGrid.appendChild(card);
        });
      }
    }

    loadProduct();
  </script>
  <script>
    // Back to top
    const _btt = document.getElementById('back-to-top');
    if (_btt) {
      window.addEventListener('scroll', () => {
        _btt.classList.toggle('visible', window.scrollY > 300);
      }, { passive: true });
      _btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }
  </script>
</body>
